theory:
  - theory_id: "no-free-lunch"
    name: "No Free Lunch Theorems for Optimization"
    year: 1997
    summary: "For any algorithm, any elevated performance over one class of problems is exactly paid for in performance over another class. Average performance of any pair of algorithms across all possible problems is identical. Algorithm performance is determined by how aligned it is with the probability distribution over optimization problems."
    category: "Classical Mechanics"
    people:
      - "david-wolpert"
      - "william-macready"
    papers:
      - "wolpert-macready-1997-no-free-lunch"
    assumptions:
      - assumption_id: "nfl-assumption-1"
        statement: "Combinatorial optimization: search space X and cost space Y are finite."
        rationale: "Enables formal treatment; matches digital computation."
      - assumption_id: "nfl-assumption-2"
        statement: "Oracle-based model: performance is measured only by the sample dym (ordered cost values from distinct function evaluations)."
        rationale: "Avoids artefacts from algorithms that revisit points; any performance measure is a function of dym."
      - assumption_id: "nfl-assumption-3"
        statement: "Algorithms are mappings from previous samples to a new (unvisited) point; formulation is deterministic (results extend to stochastic)."
        rationale: "Black-box algorithms (e.g. evolutionary, simulated annealing) fit this; branch-and-bound excluded."
    claims:
      - claim_id: "nfl-claim-1"
        statement: "For any pair of algorithms a1, a2, the sum over all cost functions f of P(dym|f,m,a1) equals the sum over all f of P(dym|f,m,a2); i.e. average performance over all problems is identical (Theorem 1)."
        status: "verified"
      - claim_id: "nfl-claim-2"
        statement: "Any algorithm performs worse than random just as readily as it performs better than random, when averaged over all optimization problems."
        status: "verified"
      - claim_id: "nfl-claim-3"
        statement: "An algorithm's average performance is determined by how aligned it is with the probability distribution P(f) over optimization problems (geometric interpretation, Section 4)."
        status: "verified"

